<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід у систему</title>
</head>
<body>

    <h2>Авторизація користувача</h2>

    {% if error %}
        <p style="color:red;font-weight:bold;">
            {{ error }}
        </p>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Увійти
        </button>

    </form>

    <p>
        Ще не зареєстровані?
        <a href="{% url 'register' %}">
            Створити акаунт
        </a>
    </p>

</body>
</html>
