<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
</head>
<body>

    <h2>Реєстрація нового користувача</h2>

    {% if error %}
        <p style="color:red;font-weight:bold;">
            {{ error }}
        </p>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Зареєструватися
        </button>

    </form>

    <p>
        Вже маєте акаунт?
        <a href="{% url 'login' %}">
            Увійти
        </a>
    </p>

</body>
</html>
